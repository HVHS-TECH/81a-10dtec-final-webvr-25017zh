<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://rawgit.com/donmccurdy/aframe-extras/v2.1.1/dist/aframe-extras.loaders.min.js"></script> 
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>

  </head>
    <body>
    <a-scene>
      <!-- thanks to Freepik and rawpixel for the skybox yo-->
      <a-sky src="outer-space-background.jpg"
      animation="
      property: rotation;
      from: 90 180 0;
      to: 90 180 180;
      loop: true;
      dur:100000;
      dir: alternate;
      "></a-sky>
      
      <a-entity 
      ply-model="src:cloud.ply"
      position="0 0 -2"
      rotation="0 0 0"
      ></a-entity>
      <a-entity 
      ply-model="src:Black Hole Final Assesment V2 Pt1.ply"
      position="-130 -84.34 -76.674"
      rotation="-90 0 0"
      scale="10 10 10"
      ></a-entity>
      <a-entity 
      ply-model="src:Black Hole Final Assesment V2 Pt3.ply"
      position="121.79 75.078 -76.328"
      rotation="90 -180 0"
      scale="10 10 10"
      ></a-entity>
      <a-entity
      ply-model="src:nebula ring pt2.ply"
      position="-18.273 247.906 -89.473"
      rotation="-90 0 0"
      scale="50 50 50"
      opacity="0.75"
      ></a-entity>
      <a-entity
      ply-model="src:nebula ring pt3.ply"
      position="-335.867 133.047 224.594"
      scale="-50 50 50"
      opacity="0.75"
      rotation="90 180 0"
      
      ></a-entity>
      <a-entity
      ply-model="src:earth.ply"
      position="0 7 9"
      rotation="90 135 0">
      </a-entity>
      <a-entity
      ply-model="src:med_rock.ply"
      rotation="90 180 0"
      animation="
      wait: 20000;
      property: position;
      from: 0 0 0;
      to: 0 0 -1000;
      dur: 2000;
      dir: alternate
      easing: easeInElastic
      "
      ></a-entity>           
    </a-scene>
  </body>
</html>
